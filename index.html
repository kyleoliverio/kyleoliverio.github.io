    <p>12 January 2020</p>
      <p>Blinking</p>
      Sitting in the bucket seat of a purple minivan <br>
      Staring out the window <br>
      Watching the raindrops race across a pane of glass <br>
      Blinking once <br>
      Blinking twice <br>
      Wondering if and when I'll blink again <br>
